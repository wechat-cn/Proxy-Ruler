    include-all: true
    filter: (?i)台|新北|彰化|TW|Taiwan
    type: select
    interval: 300
    tolerance: 50
  - name: 🇸🇬Singapore
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/singapore%282%29.png
    include-all: true
    filter: (?i)新加坡|坡|狮城|SG|Singapore
    type: select
    interval: 300
    tolerance: 50
  - name: 🇰🇷Korea
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/Korea%281%29.png
    include-all: true
    filter: (?i)KR|Korea|KOR|首尔|韩|韓
    type: select
    interval: 300
    tolerance: 50
  - name: GLOBAL
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    include-all: true
    type: select
    proxies:
